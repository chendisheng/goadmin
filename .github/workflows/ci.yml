name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: go test ./...

  web-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build bundle
        env:
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE || 'GoAdmin' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api/v1' }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  server-build:
    name: Build Backend Binary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Build server binary
        run: go build -o goadmin ./cmd/server

      - name: Upload server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-bin
          path: server/goadmin
          if-no-files-found: error
          retention-days: 7

  checks:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - test
      - web-build
      - server-build
    steps:
      - name: CI completed
        run: echo "CI checks completed successfully"
