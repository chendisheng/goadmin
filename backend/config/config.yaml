app:
  name: GoAdmin
  env: dev
  version: 0.1.0

server:
  http:
    host: 0.0.0.0
    port: 8080
    read_timeout: 10s
    write_timeout: 10s
    idle_timeout: 60s
    shutdown_timeout: 5s

logger:
  level: info
  format: json
  output: stdout
  development: true

database:
  driver: mysql
  dsn: goadmin:goadmin@tcp(127.0.0.1:3306)/goadmin?charset=utf8mb4&parseTime=True&loc=Local
  auto_migrate: true
  log_sql: true

codegen:
  generated_modules_auto_migrate: false
  artifact:
    enabled: true
    base_dir: /tmp/goadmin/codegen
    ttl: 24h

upload:
  storage:
    driver: local
    local:
      base_dir: /tmp/goadmin/uploads
      public_base_url: /uploads/files
      use_proxy_download: true
    s3_compatible:
      endpoint: http://127.0.0.1:9000
      region: us-east-1
      bucket: goadmin-upload
      access_key_id: minioadmin
      access_key_secret: minioadmin
      use_ssl: false
      path_style: true
      public_base_url: https://cdn.example.com/uploads
    oss:
      endpoint: https://oss-cn-hangzhou.aliyuncs.com
      bucket: goadmin-upload
      access_key_id: xxx
      access_key_secret: xxx
      public_base_url: https://cdn.example.com/uploads
    cos:
      region: ap-guangzhou
      bucket: goadmin-upload-1250000000
      secret_id: xxx
      secret_key: xxx
      public_base_url: https://cdn.example.com/uploads
    minio:
      endpoint: http://127.0.0.1:9000
      bucket: goadmin-upload
      access_key_id: minioadmin
      access_key_secret: minioadmin
      use_ssl: false
      path_style: true
      public_base_url: http://127.0.0.1:9000/goadmin-upload
    policy:
      max_upload_size: 20mb
      allowed_extensions:
        - .png
        - .jpg
        - .jpeg
        - .webp
        - .pdf
        - .txt
      allowed_mime_types:
        - image/png
        - image/jpeg
        - image/webp
        - application/pdf
        - text/plain
      visibility_default: private
      path_prefix: uploads

# tenant.enabled controls whether multi-tenant behavior is enabled.
tenant:
  enabled: true

i18n:
  default_language: zh-CN
  supported_languages:
    - zh-CN
    - en-US

auth:
  jwt:
    issuer: GoAdmin
    audience: goadmin-api
    access_token_ttl: 2h
    refresh_token_ttl: 168h
  casbin:
    enabled: true
    source: db # supported: file, db
    model_path: core/auth/casbin/model/rbac.conf
    policy_path: core/auth/casbin/adapter/policy.csv
  bootstrap:
    users: []
