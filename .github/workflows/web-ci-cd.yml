name: Phase 15 Frontend CI/CD (Manual Backup)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish frontend image after build
        type: boolean
        required: true
        default: true

# Manual backup workflow. The unified frontend/server pipeline lives in .github/workflows/ci-cd.yml.

env:
  NODE_VERSION: "20"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/goadmin-web

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build bundle
        env:
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE || 'GoAdmin' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api/v1' }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  build-image:
    name: Build and Push Web Image
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_dispatch' || inputs.publish == true)
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/web.Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_TITLE=${{ vars.VITE_APP_TITLE || 'GoAdmin' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
