name: CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - test
          - prod
      deploy:
        description: Deploy after build
        type: boolean
        required: true
        default: true

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  SERVER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/goadmin
  WEB_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/goadmin-web
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: deploy/helm/goadmin
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'goadmin' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: go test ./...

  web-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build bundle
        env:
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE || 'GoAdmin' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api/v1' }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  build-server-image:
    name: Build and Push Server Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,prefix=branch-
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web-image:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs: web-build
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,prefix=branch-
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/web.Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_TITLE=${{ vars.VITE_APP_TITLE || 'GoAdmin' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs:
      - build-server-image
      - build-web-image
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
      DATABASE_DSN: ${{ secrets.GOADMIN_DATABASE_DSN }}
      JWT_SECRET: ${{ secrets.GOADMIN_AUTH_JWT_SECRET }}
      SERVER_IMAGE_TAG: ${{ needs.build-server-image.outputs.image-tag }}
      WEB_IMAGE_TAG: ${{ needs.build-web-image.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG_DATA }}' | base64 -d > "$HOME/.kube/config"

      - name: Deploy chart
        shell: bash
        run: |
          helm upgrade --install goadmin "${HELM_CHART_PATH}" \
            --namespace "${KUBE_NAMESPACE}" \
            --create-namespace \
            --values "${HELM_CHART_PATH}/values.yaml" \
            --values "${HELM_CHART_PATH}/values-${DEPLOY_ENV}.yaml" \
            --set image.repository="${SERVER_IMAGE_NAME}" \
            --set image.tag="${SERVER_IMAGE_TAG}" \
            --set frontend.image.repository="${WEB_IMAGE_NAME}" \
            --set frontend.image.tag="${WEB_IMAGE_TAG}" \
            --set-string secret.databaseDsn="${DATABASE_DSN}" \
            --set-string secret.jwtSecret="${JWT_SECRET}"
