app:
  env: prod

server:
  http:
    port: 8000
    read_timeout: 5s
    write_timeout: 5s
    idle_timeout: 60s
    shutdown_timeout: 10s

logger:
  level: info
  format: json
  output: stdout
  development: false

database:
  driver: mysql
  dsn: goadmin:goadmin@tcp(127.0.0.1:3306)/goadmin_prod?charset=utf8mb4&parseTime=True&loc=Local
  auto_migrate: true
  log_sql: true

codegen:
  generated_modules_auto_migrate: false
  artifact:
    enabled: true
    base_dir: /tmp/goadmin/codegen
    ttl: 24h

upload:
  storage:
    driver: local
    local:
      base_dir: /tmp/goadmin/uploads
      public_base_url: /api/v1/uploads/files
      use_proxy_download: true
    policy:
      max_upload_size: 20mb
      allowed_extensions:
        - .png
        - .jpg
        - .jpeg
        - .webp
        - .pdf
        - .txt
      allowed_mime_types:
        - image/png
        - image/jpeg
        - image/webp
        - application/pdf
        - text/plain
      visibility_default: private
      path_prefix: uploads

# tenant.enabled controls whether multi-tenant behavior is enabled.
tenant:
  enabled: true

auth:
  casbin:
    enabled: true
    source: db # supported: file, db
    model_path: core/auth/casbin/model/rbac.conf
    policy_path: core/auth/casbin/adapter/policy.csv
