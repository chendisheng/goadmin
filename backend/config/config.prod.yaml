app:
  env: prod

server:
  http:
    port: 8000
    read_timeout: 5s
    write_timeout: 5s
    idle_timeout: 60s
    shutdown_timeout: 10s

logger:
  level: info
  format: json
  output: stdout
  development: false

database:
  driver: mysql
  dsn: goadmin:goadmin@tcp(127.0.0.1:3306)/goadmin_prod?charset=utf8mb4&parseTime=True&loc=Local
  auto_migrate: true

codegen:
  artifact:
    enabled: true
    base_dir: /tmp/goadmin/codegen
    ttl: 24h

# tenant.enabled controls whether multi-tenant behavior is enabled.
tenant:
  enabled: true

auth:
  casbin:
    enabled: true
    source: db # supported: file, db
    model_path: core/auth/casbin/model/rbac.conf
    policy_path: core/auth/casbin/adapter/policy.csv
