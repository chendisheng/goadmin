name: Phase 9 CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - test
          - prod
      deploy:
        description: Deploy after build
        type: boolean
        required: true
        default: true

env:
  GO_VERSION: "1.22"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/goadmin
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: deploy/helm/goadmin
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'goadmin' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./...

  build-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs: build-image
    if: |
      github.event_name == 'workflow_dispatch' && inputs.deploy == true ||
      startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
      DATABASE_DSN: ${{ secrets.GOADMIN_DATABASE_DSN }}
      JWT_SECRET: ${{ secrets.GOADMIN_AUTH_JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG_DATA }}' | base64 -d > "$HOME/.kube/config"

      - name: Deploy chart
        shell: bash
        run: |
          helm upgrade --install goadmin "${HELM_CHART_PATH}" \
            --namespace "${KUBE_NAMESPACE}" \
            --create-namespace \
            --values "${HELM_CHART_PATH}/values.yaml" \
            --values "${HELM_CHART_PATH}/values-${DEPLOY_ENV}.yaml" \
            --set image.repository="${IMAGE_NAME}" \
            --set image.tag="${IMAGE_TAG}" \
            --set-string secret.databaseDsn="${DATABASE_DSN}" \
            --set-string secret.jwtSecret="${JWT_SECRET}"
