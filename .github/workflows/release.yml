name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: Target deployment environment
        type: choice
        required: true
        default: prod
        options:
          - test
          - prod

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  SERVER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/goadmin
  WEB_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/goadmin-web
  HELM_CHART_PATH: deploy/helm/goadmin
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'goadmin' }}

jobs:
  build-server-image:
    name: Build and Push Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web-image:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/web.Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_TITLE=${{ vars.VITE_APP_TITLE || 'GoAdmin' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs:
      - build-server-image
      - build-web-image
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
      DATABASE_DSN: ${{ secrets.GOADMIN_DATABASE_DSN }}
      JWT_SECRET: ${{ secrets.GOADMIN_AUTH_JWT_SECRET }}
      SERVER_IMAGE_TAG: ${{ needs.build-server-image.outputs.image-tag }}
      WEB_IMAGE_TAG: ${{ needs.build-web-image.outputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBE_CONFIG_DATA }}' | base64 -d > "$HOME/.kube/config"

      - name: Deploy chart
        shell: bash
        run: |
          helm upgrade --install goadmin "${HELM_CHART_PATH}" \
            --namespace "${KUBE_NAMESPACE}" \
            --create-namespace \
            --values "${HELM_CHART_PATH}/values.yaml" \
            --values "${HELM_CHART_PATH}/values-${DEPLOY_ENV}.yaml" \
            --set image.repository="${SERVER_IMAGE_NAME}" \
            --set image.tag="${SERVER_IMAGE_TAG}" \
            --set frontend.image.repository="${WEB_IMAGE_NAME}" \
            --set frontend.image.tag="${WEB_IMAGE_TAG}" \
            --set-string secret.databaseDsn="${DATABASE_DSN}" \
            --set-string secret.jwtSecret="${JWT_SECRET}"
