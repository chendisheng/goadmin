apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goadmin.fullname" . }}
  labels:
    {{- include "goadmin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "goadmin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "goadmin.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: goadmin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
          envFrom:
            - configMapRef:
                name: {{ include "goadmin.fullname" . }}-config
            - secretRef:
                name: {{ include "goadmin.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
